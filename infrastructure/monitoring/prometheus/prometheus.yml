global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: metapilot
    environment: production

rule_files:
  - "alerts/*.yml"

scrape_configs:
  # Django API metrics (via django-prometheus or custom /metrics endpoint)
  - job_name: metapilot-api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
    scrape_interval: 30s

  # Celery worker metrics (via celery-prometheus-exporter)
  - job_name: metapilot-celery
    static_configs:
      - targets: ["celery-exporter:9808"]
    scrape_interval: 30s

  # Redis metrics
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  # PostgreSQL metrics
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # Node exporter (host metrics)
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
