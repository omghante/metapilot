version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: metapilot-postgres
    environment:
      POSTGRES_USER: metapilot
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: metapilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metapilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: metapilot-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django API (Daphne ASGI) ─────────────────────────────────
  api:
    build:
      context: ../../../services/api
      dockerfile: Dockerfile
    container_name: metapilot-api
    environment:
      - SECRET_KEY=dev-secret-key-not-for-production
      - DEBUG=True
      - DATABASE_URL=postgresql://metapilot:devpassword@postgres:5432/metapilot
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CHANNEL_REDIS_URL=redis://redis:6379/1
      - ALLOWED_HOSTS=localhost,127.0.0.1,api
      - CORS_ALLOW_ALL_ORIGINS=True
      - FERNET_KEY=${FERNET_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ../../../services/api:/app
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --no-input &&
             daphne -b 0.0.0.0 -p 8000 core.asgi:application"

  # ── Celery Worker ────────────────────────────────────────────
  worker:
    build:
      context: ../../../services/api
      dockerfile: Dockerfile
    container_name: metapilot-worker
    environment:
      - SECRET_KEY=dev-secret-key-not-for-production
      - DEBUG=True
      - DATABASE_URL=postgresql://metapilot:devpassword@postgres:5432/metapilot
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - FERNET_KEY=${FERNET_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - ../../../services/api:/app
    depends_on:
      - api
      - redis
    command: >
      celery -A core worker
      -Q celery,scheduler,jobs
      --loglevel=info
      --concurrency=4

  # ── Celery Beat ──────────────────────────────────────────────
  beat:
    build:
      context: ../../../services/api
      dockerfile: Dockerfile
    container_name: metapilot-beat
    environment:
      - SECRET_KEY=dev-secret-key-not-for-production
      - DEBUG=True
      - DATABASE_URL=postgresql://metapilot:devpassword@postgres:5432/metapilot
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - FERNET_KEY=${FERNET_KEY:-}
    volumes:
      - ../../../services/api:/app
    depends_on:
      - api
      - redis
    command: >
      celery -A core beat
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
      --loglevel=info

  # ── Next.js Dashboard ────────────────────────────────────────
  web:
    build:
      context: ../../../apps
      dockerfile: Dockerfile
      target: development
    container_name: metapilot-web
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ../../../apps:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  media_data:
