<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Test | Whatsapp Marketing API</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0d47a1; /* Deep Blue - switching from green as this is a Saas/Marketing app */
            --accent-color: #ffb300; /* Amber */
            --bg-color: #f4f7f6;
            --text-color: #333;
            --text-muted: #666;
            --white: #ffffff;
            --border-radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* Specific brand colors from memories if applicable, but making it professional */
        .brand-green { --primary-color: #1b5e20; } 

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: var(--white);
            padding: 1rem 2rem;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 2rem auto;
            width: 100%;
            padding: 0 1rem;
            overflow: hidden;
        }

        .config-panel {
            background: var(--white);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }

        .config-panel h2 {
            font-size: 1rem;
            margin-bottom: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.875rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .chat-container {
            background: var(--white);
            flex: 1;
            display: flex;
            flex-direction: column;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 1rem;
            border-radius: 18px;
            font-size: 0.9375rem;
            position: relative;
        }

        .message.bot {
            align-self: flex-start;
            background-color: #f0f0f0;
            border-bottom-left-radius: 4px;
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--primary-color);
            color: var(--white);
            border-bottom-right-radius: 4px;
        }

        .chat-input {
            padding: 1.5rem;
            border-top: 1px solid #eee;
            display: flex;
            gap: 0.75rem;
        }

        #message-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 0.9375rem;
        }

        button {
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            padding: 0 1.5rem;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.5rem;
        }

        .status-online { background-color: #4caf50; }
        .status-offline { background-color: #f44336; }

        .loading-dots {
            display: flex;
            gap: 4px;
        }

        .loading-dots div {
            width: 8px;
            height: 8px;
            background-color: #888;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots div:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots div:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        .badge {
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            background-color: #e3f2fd;
            color: var(--primary-color);
            font-weight: 500;
        }
    </style>
</head>
<body class="brand-green">
    <header>
        <div class="logo">
            <span>📱</span> 
            Whatsapp Marketing API <span class="badge">Chatbot Test v1.0</span>
        </div>
        <div id="connection-status">
            <span class="status-dot status-offline"></span>
            <span style="font-size: 0.875rem; color: var(--text-muted)">Disconnected</span>
        </div>
    </header>

    <main>
        <div class="config-panel">
            <h2>Authentication Configuration</h2>
            <div class="input-group">
                <label for="jwt-token">JWT Access Token</label>
                <input type="password" id="jwt-token" placeholder="Paste your Bearer token here...">
            </div>
            <div class="input-group">
                <label for="tenant-name">Tenant Name (Optional)</label>
                <input type="text" id="tenant-name" placeholder="Leave blank to use default">
            </div>
        </div>

        <div class="chat-container">
            <div class="chat-messages" id="chat-messages">
                <div class="message bot">
                    Hello! I'm the Platform Assistant. Please provide your JWT token above, then ask me anything about the WhatsApp Marketing platform.
                </div>
            </div>
            <div class="chat-input">
                <input type="text" id="message-input" placeholder="Type your question..." autocomplete="off">
                <button id="send-btn">Send</button>
            </div>
        </div>
    </main>

    <script>
        const messagesContainer = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const tokenInput = document.getElementById('jwt-token');
        const tenantInput = document.getElementById('tenant-name');
        const statusContainer = document.getElementById('connection-status');

        function addMessage(text, isUser = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            msgDiv.innerText = text;
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            return msgDiv;
        }

        function addLoading() {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message bot';
            msgDiv.innerHTML = '<div class="loading-dots"><div></div><div></div><div></div></div>';
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            return msgDiv;
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            const token = tokenInput.value.trim();
            const tenant = tenantInput.value.trim();

            if (!message) return;
            if (!token) {
                alert('Please provide a JWT Access Token first.');
                return;
            }

            addMessage(message, true);
            messageInput.value = '';
            
            const loadingMsg = addLoading();

            try {
                const response = await fetch('/api/chatbot/test/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        message: message,
                        tenant_name: tenant || undefined
                    })
                });

                const data = await response.json();
                loadingMsg.remove();

                if (response.ok) {
                    addMessage(data.answer || 'No response received.');
                    updateStatus(true);
                } else {
                    addMessage(`Error: ${data.error || data.detail || 'Request failed'}`);
                    updateStatus(false);
                }
            } catch (error) {
                loadingMsg.remove();
                addMessage(`Error: ${error.message}`);
                updateStatus(false);
            }
        }

        function updateStatus(online) {
            const dot = statusContainer.querySelector('.status-dot');
            const text = statusContainer.querySelector('span:last-child');
            if (online) {
                dot.className = 'status-dot status-online';
                text.innerText = 'Connected';
            } else {
                dot.className = 'status-dot status-offline';
                text.innerText = 'Error/Disconnected';
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
