[tool.ruff]
target-version = "py312"
line-length = 100
exclude = [
    ".venv",
    "venv",
    "migrations",
    "__pycache__",
    "*.egg-info",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # Pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "N",    # pep8-naming
    "SIM",  # flake8-simplify
    "TID",  # flake8-tidy-imports
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in default arguments
    "N999",   # invalid module name (Django apps use underscores)
]

[tool.ruff.lint.isort]
known-first-party = ["core", "users", "tenants", "api", "messaging",
                     "campaigns", "templates", "scheduler", "analytics",
                     "billing", "notifications", "inbox", "webhooks",
                     "chatbot", "wa_chatbot"]
