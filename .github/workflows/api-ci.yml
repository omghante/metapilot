name: API — CI

on:
  push:
    branches: [main, develop]
    paths:
      - "services/api/**"
      - ".github/workflows/api-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "services/api/**"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff mypy

      - name: Run Ruff (lint)
        run: ruff check .

      - name: Run Ruff (format check)
        run: ruff format --check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: metapilot
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: metapilot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "True"
      DATABASE_URL: postgresql://metapilot:testpass@localhost:5432/metapilot_test
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      CHANNEL_REDIS_URL: redis://localhost:6379/1
      FERNET_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-django pytest-cov

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Run tests
        run: pytest --cov=. --cov-report=xml -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./services/api/coverage.xml
          flags: api
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install bandit
        run: pip install bandit

      - name: Run Bandit security scan
        run: bandit -r . -x ./.venv,./tests -ll
