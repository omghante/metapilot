name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement, needs-triage]
body:
  - type: input
    id: summary
    attributes:
      label: Feature Summary
      placeholder: "e.g. Support for WhatsApp reaction messages in inbox"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: "Currently there's no way to see message reactions..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      placeholder: "Add reaction display in InboxMessage model and ChatWindow component..."
    validations:
      required: true

  - type: dropdown
    id: domain
    attributes:
      label: Domain
      options:
        - Messaging
        - Campaigns
        - Templates
        - Inbox
        - Scheduler
        - Analytics
        - AI Chatbot
        - Multi-tenancy
        - Billing
        - Infrastructure
        - Developer Experience
    validations:
      required: true
